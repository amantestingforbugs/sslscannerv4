<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SSL Sentinel Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0b1020;--panel:#121a2f;--muted:#93a0c2;--text:#e9eeff;--primary:#5b8cff;--border:#273354;--ok:#26c281;--warn:#f6b73c;--bad:#f0566b}
    [data-theme="light"]{--bg:#f5f8ff;--panel:#fff;--muted:#5b6789;--text:#111a34;--primary:#3c68f3;--border:#dbe3f7;--ok:#059669;--warn:#b45309;--bad:#dc2626}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,sans-serif;background:var(--bg);color:var(--text)}
    .app{display:grid;grid-template-columns:240px 1fr;height:100vh}
    .side{border-right:1px solid var(--border);padding:18px;background:var(--panel)}
    .brand{font-weight:700;margin-bottom:18px}.nav button{display:block;width:100%;margin:8px 0;padding:10px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text);text-align:left}
    .nav button.active,.nav button:hover{background:rgba(91,140,255,.12);border-color:var(--primary)}
    .main{display:flex;flex-direction:column;min-width:0}
    .top{height:62px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 18px;background:var(--panel)}
    .content{padding:16px;overflow:auto}
    .grid{display:grid;grid-template-columns:repeat(5,minmax(130px,1fr));gap:12px}
    .card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px}
    .k{font-size:26px;font-weight:700}.m{color:var(--muted);font-size:12px}
    .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
    input,select,button{background:transparent;color:var(--text);border:1px solid var(--border);border-radius:9px;padding:8px}
    table{width:100%;border-collapse:collapse} th,td{border-bottom:1px solid var(--border);padding:9px;font-size:13px} th{cursor:pointer;text-align:left}
    .hidden{display:none}.row{display:grid;grid-template-columns:2fr 1fr;gap:12px}.badge{padding:3px 8px;border-radius:999px;font-size:11px;font-weight:600}
    .high{background:rgba(240,86,107,.15);color:var(--bad)}.medium{background:rgba(246,183,60,.16);color:var(--warn)}.low{background:rgba(38,194,129,.14);color:var(--ok)}
    .logs{height:260px;overflow:auto;font-family:ui-monospace,monospace;font-size:12px;line-height:1.45}
    .toast{position:fixed;top:14px;right:14px;background:var(--panel);border:1px solid var(--border);padding:10px 12px;border-radius:10px;z-index:20}
    @media(max-width:980px){.app{grid-template-columns:1fr}.side{display:none}.grid{grid-template-columns:repeat(2,1fr)}.row{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand">SSL Sentinel Pro</div>
    <nav class="nav">
      <button class="tab active" data-tab="dashboard">Dashboard</button>
      <button class="tab" data-tab="alerts">Alerts</button>
      <button class="tab" data-tab="discoveries">New Discoveries</button>
      <button class="tab" data-tab="logs">Live Logs</button>
    </nav>
  </aside>
  <section class="main">
    <header class="top"><strong id="title">Dashboard</strong><div><button id="theme">🌓</button> <select id="project"></select></div></header>
    <main class="content">
      <section id="dashboard" class="view">
        <div class="grid">
          <div class="card"><div class="k" id="s-projects">0</div><div class="m">Projects</div></div>
          <div class="card"><div class="k" id="s-hosts">0</div><div class="m">Hosts</div></div>
          <div class="card"><div class="k" id="s-mismatch">0</div><div class="m">Mismatches</div></div>
          <div class="card"><div class="k" id="s-expired">0</div><div class="m">Expired</div></div>
          <div class="card"><div class="k" id="s-alerts">0</div><div class="m">Unseen alerts</div></div>
        </div>
        <div class="row" style="margin-top:12px">
          <div class="card">
            <h3>Results</h3>
            <div class="toolbar">
              <input id="resultSearch" placeholder="Search hostname" />
              <select id="resultFilter"><option value="all">All</option><option value="mismatch">Mismatch</option><option value="expired">Expired</option><option value="errors">Errors</option></select>
              <button onclick="loadResults(1)">Apply</button>
              <button onclick="downloadExport('csv')">Export CSV</button><button onclick="downloadExport('json')">Export JSON</button>
            </div>
            <table><thead><tr><th onclick="sortBy('hostname')">Hostname</th><th onclick="sortBy('risk_level')">Risk</th><th>Issuer Org</th><th>Expiry</th><th>Status</th></tr></thead><tbody id="resultsBody"></tbody></table>
            <div class="toolbar"><button onclick="prevRes()">Prev</button><span id="resPage"></span><button onclick="nextRes()">Next</button></div>
          </div>
          <div class="card">
            <h3>Project Insights</h3>
            <div id="insights" class="m">No data</div>
          </div>
        </div>
      </section>

      <section id="alerts" class="view hidden">
        <div class="card">
          <h3>Alerts</h3>
          <div class="toolbar">
            <input id="alertSearch" placeholder="Search hostname" />
            <select id="alertType"><option value="">Mismatch type</option><option value="same_domain">Same domain</option><option value="different_domain">Different domain</option></select>
            <select id="alertSeverity"><option value="">Severity</option><option>HIGH</option><option>MEDIUM</option><option>LOW</option></select>
            <button onclick="loadAlerts()">Filter</button>
          </div>
          <table><thead><tr><th>Time</th><th>Host</th><th>Issue</th><th>Severity</th><th>Type</th></tr></thead><tbody id="alertsBody"></tbody></table>
        </div>
      </section>

      <section id="discoveries" class="view hidden">
        <div class="card">
          <h3>New Discoveries</h3>
          <div class="toolbar"><input id="discSearch" placeholder="Search" /><button onclick="loadDiscoveries(1)">Search</button></div>
          <table><thead><tr><th>Hostname</th><th>First Seen</th><th>Risk</th><th>SSL</th></tr></thead><tbody id="discBody"></tbody></table>
          <div class="toolbar"><button onclick="prevDisc()">Prev</button><span id="discPage"></span><button onclick="nextDisc()">Next</button></div>
        </div>
      </section>

      <section id="logs" class="view hidden">
        <div class="card"><h3>Live Logs (Subfinder + SSL)</h3><div class="logs" id="logBox"></div></div>
      </section>
    </main>
  </section>
</div>
<script>
const state={projects:[],projectId:null,scanId:null,resPage:1,resPages:1,discPage:1,discPages:1,sortKey:'hostname',sortDir:1};
const $=s=>document.querySelector(s);
function toast(t){const n=document.createElement('div');n.className='toast';n.textContent=t;document.body.appendChild(n);setTimeout(()=>n.remove(),2200)}
function fmt(s){return s?new Date(s).toLocaleString():"-"}

$('#theme').onclick=()=>{const cur=document.documentElement.dataset.theme==='dark'?'light':'dark';document.documentElement.dataset.theme=cur;localStorage.setItem('theme',cur)};
document.documentElement.dataset.theme=localStorage.getItem('theme')||'dark';

document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.querySelectorAll('.view').forEach(v=>v.classList.add('hidden'));$('#'+b.dataset.tab).classList.remove('hidden');$('#title').textContent=b.textContent;});

async function api(url,opt){const r=await fetch(url,opt);const j=await r.json();if(!j.ok)throw new Error(j.error||'request failed');return j.data}
async function boot(){
  const projects=await api('/api/projects'); state.projects=projects; const sel=$('#project'); sel.innerHTML=projects.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
  if(projects[0]){state.projectId=projects[0].id;state.scanId=projects[0].latest_scan?.id||null;sel.value=state.projectId}
  sel.onchange=()=>{state.projectId=sel.value;const p=state.projects.find(x=>x.id===state.projectId);state.scanId=p?.latest_scan?.id||null;refreshAll()};
  await refreshAll(); startSSE();
}
async function refreshAll(){await loadStats(); await loadAlerts(); await loadInsights(); if(state.scanId) await loadResults(1); await loadDiscoveries(1); await loadLogs();}

async function loadStats(){const s=await api('/api/stats'); $('#s-projects').textContent=s.projects;$('#s-hosts').textContent=s.hosts;$('#s-mismatch').textContent=s.mismatches;$('#s-expired').textContent=s.expired;$('#s-alerts').textContent=s.unseen_alerts}
async function loadInsights(){if(!state.projectId)return; const d=await api(`/api/projects/${state.projectId}/insights`); $('#insights').innerHTML=`Latest scan: ${d.latest_scan_id||'-'}<br>New issues: ${d.new_issues}<br>Fixed issues: ${d.fixed_issues}<br>Risk: ${JSON.stringify(d.risk_distribution||{})}`}

function sortBy(k){if(state.sortKey===k)state.sortDir*=-1;else{state.sortKey=k;state.sortDir=1;} loadResults(state.resPage)}
async function loadResults(page){if(!state.scanId){$('#resultsBody').innerHTML='<tr><td colspan="5">No scan data yet</td></tr>';return;} state.resPage=page; const flt=$('#resultFilter').value; const d=await api(`/api/scans/${state.scanId}/results?filter=${encodeURIComponent(flt)}&page=${page}&per_page=50`); state.resPages=d.pages;
 let rows=d.results.filter(r=>!$('#resultSearch').value||r.hostname.toLowerCase().includes($('#resultSearch').value.toLowerCase()));
 rows.sort((a,b)=>((a[state.sortKey]||'')>(b[state.sortKey]||'')?1:-1)*state.sortDir);
 $('#resultsBody').innerHTML=rows.map(r=>`<tr><td>${r.hostname}</td><td><span class="badge ${(r.risk_level||'LOW').toLowerCase()}">${r.risk_level||'LOW'}</span></td><td>${r.issuer_org||'-'}</td><td>${r.expiry||'-'}</td><td>${r.error?`Error: ${r.error}`:(r.is_mismatch?'Mismatch':r.is_expired?'Expired':'OK')}</td></tr>`).join('');
 $('#resPage').textContent=`${d.page}/${d.pages}`;
}
function prevRes(){if(state.resPage>1)loadResults(state.resPage-1)} function nextRes(){if(state.resPage<state.resPages)loadResults(state.resPage+1)}
function downloadExport(fmt){if(!state.scanId)return toast('No scan selected'); window.open(`/api/scans/${state.scanId}/export?format=${fmt}`,'_blank')}

async function loadAlerts(){const q=new URLSearchParams({limit:200,search:$('#alertSearch').value,mismatch_type:$('#alertType').value,severity:$('#alertSeverity').value}); const d=await api('/api/alerts?'+q.toString());
 $('#alertsBody').innerHTML=d.map(a=>`<tr><td>${fmt(a.created_at)}</td><td>${a.hostname}</td><td>${a.issue_type}</td><td><span class="badge ${a.severity.toLowerCase()}">${a.severity}</span></td><td>${a.mismatch_type}</td></tr>`).join('')}

async function loadDiscoveries(page){if(!state.projectId)return; state.discPage=page; const d=await api(`/api/projects/${state.projectId}/discoveries?page=${page}&per_page=25&search=${encodeURIComponent($('#discSearch').value)}`);state.discPages=d.pages;
 $('#discBody').innerHTML=d.rows.map(r=>`<tr><td>${r.hostname}</td><td>${fmt(r.first_seen)}</td><td><span class="badge ${(r.risk_level||'LOW').toLowerCase()}">${r.risk_level||'LOW'}</span></td><td>${r.error?`Error: ${r.error}`:(r.is_mismatch?'Mismatch':'OK')}</td></tr>`).join('');$('#discPage').textContent=`${d.page}/${d.pages}`}
function prevDisc(){if(state.discPage>1)loadDiscoveries(state.discPage-1)} function nextDisc(){if(state.discPage<state.discPages)loadDiscoveries(state.discPage+1)}

async function loadLogs(){const d=await api('/api/logs?limit=120'); $('#logBox').innerHTML=d.map(l=>`[${fmt(l.timestamp)}] ${l.component.toUpperCase()} ${l.level}: ${l.message}`).join('<br>')}
function startSSE(){const e=new EventSource('/api/sse'); e.addEventListener('stats_update',()=>loadStats()); e.addEventListener('alert_update',ev=>{const d=JSON.parse(ev.data);$('#s-alerts').textContent=d.unseen_count; toast(`Alerts: ${d.unseen_count}`)}); e.addEventListener('log_update',ev=>{const d=JSON.parse(ev.data).entry; const b=$('#logBox'); b.innerHTML += `<br>[${fmt(d.timestamp)}] ${d.component.toUpperCase()} ${d.level}: ${d.message}`; b.scrollTop=b.scrollHeight}); e.addEventListener('scan_update',()=>{if($('#dashboard').classList.contains('hidden'))return; loadResults(state.resPage)});}
boot().catch(e=>toast(e.message));
</script>
</body>
</html>
